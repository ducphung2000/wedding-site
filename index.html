<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Thiệp cưới 💍</title>

    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Quicksand', sans-serif;
            background: #fff5f7;
            text-align: center;
        }

        /* 💌 Open screen */
        #openScreen {
            position: fixed;
            width: 100%;
            height: 100%;
            background: pink;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #openScreen button {
            padding: 15px 30px;
            border-radius: 30px;
            border: none;
            background: #ff6b81;
            color: white;
            font-size: 18px;
        }

        /* main hidden */
        #main {
            display: none;
        }

        h1,
        h2 {
            font-family: 'Pacifico';
            color: #ff6b81;
        }

        /* hero */
        .hero {
            padding: 80px 20px;
            background: linear-gradient(to right, #ffd1dc, #ffe4e1);
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
        }

        /* slideshow */
        .slideshow img {
            width: 80%;
            border-radius: 20px;
            margin-top: 20px;
        }

        /* map */
        iframe {
            width: 90%;
            height: 250px;
            border-radius: 20px;
        }

        /* button */
        button {
            cursor: pointer;
        }
    </style>
</head>

<body>

    <!-- 💌 Open -->
    <div id="openScreen">
        <h1>💌 Bạn có thiệp cưới</h1>
        <button onclick="openInvite()">Mở thiệp 💖</button>
    </div>

    <!-- 🎵 Music -->
    <audio id="music" loop>
        <source src="music.mp3">
    </audio>

    <!-- 🌐 Main -->
    <div id="main">

        <section class="hero">
            <h1>💍 Phụng & ❤️ 💍</h1>
            <p>Chúng mình sắp cưới rồi 🥰</p>
        </section>

        <!-- 📸 Slideshow -->
        <section class="slideshow">
            <h2>📸 Khoảnh khắc</h2>
            <img id="slide" src="img1.jpg">
        </section>

        <!-- 📍 Map -->
        <section>
            <h2>📍 Địa điểm</h2>
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m17!1m12!1m3!1d3718.717376877517!2d106.38041907519404!3d21.243052980460394!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m2!1m1!2zMjHCsDE0JzM1LjAiTiAxMDbCsDIyJzU4LjgiRQ!5e0!3m2!1svi!2s!4v1774594497966!5m2!1svi!2s"
                width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
                referrerpolicy="no-referrer-when-downgrade"></iframe>
        </section>

    </div>

    <script>
        function openInvite() {
            document.getElementById("openScreen").style.display = "none";
            document.getElementById("main").style.display = "block";

            // play music
            document.getElementById("music").play();
        }

        // slideshow
        const images = ["img1.jpg", "img2.jpg", "img3.jpg"];
        let i = 0;
        console.log("hehehe")
        setInterval(() => {
            i = (i + 1) % images.length;
            document.getElementById("slide").src = images[i];
        }, 3000);
    </script>

</body>

</html>
